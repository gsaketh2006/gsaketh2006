<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#03050a" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#05070c" />
    </linearGradient>

    <!-- Accent Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9A7B3C" />
      <stop offset="50%" stop-color="#F3E5AB" />
      <stop offset="100%" stop-color="#D4AF37" />
    </linearGradient>

    <!-- Glowing Line Gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0" />
      <stop offset="20%" stop-color="#D4AF37" stop-opacity="1" />
      <stop offset="50%" stop-color="#F3E5AB" stop-opacity="1" />
      <stop offset="80%" stop-color="#9A7B3C" stop-opacity="1" />
      <stop offset="100%" stop-color="#9A7B3C" stop-opacity="0" />
    </linearGradient>

    <!-- Radial Glows -->
    <radialGradient id="glowLeft" cx="15%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#1E3A8A" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#1E3A8A" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowRight" cx="85%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0" />
    </radialGradient>

    <!-- Sleek Tech Grid Pattern -->
    <pattern id="techGrid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1E293B" stroke-width="0.5" stroke-opacity="0.4" />
      <circle cx="0" cy="0" r="1" fill="#D4AF37" fill-opacity="0.3" />
    </pattern>

    <!-- Glow Filter -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulseGlow {
      0% { opacity: 0.4; }
      50% { opacity: 0.7; }
      100% { opacity: 0.4; }
    }
    @keyframes gridFloat {
      0% { transform: translateY(0px); }
      100% { transform: translateY(50px); }
    }
    .pulse-glow-1 { animation: pulseGlow 6s ease-in-out infinite; }
    .pulse-glow-2 { animation: pulseGlow 9s ease-in-out infinite alternate; }
    .grid-bg { animation: gridFloat 25s linear infinite; }
    
    .text-name {
      font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
      font-weight: 900;
      font-size: 58px;
      fill: url(#goldGrad);
      letter-spacing: 12px;
    }
    .text-title {
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 13px;
      fill: #94A3B8;
      letter-spacing: 6px;
      text-transform: uppercase;
    }
    .text-code {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 11px;
      fill: #D4AF37;
      letter-spacing: 2px;
      opacity: 0.8;
    }
    .accent-border {
      stroke: #334155;
      stroke-width: 1.5;
    }
    .corner-decor {
      fill: none;
      stroke: #D4AF37;
      stroke-width: 1.5;
    }
  </style>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Animated Ambient Orbs -->
  <circle cx="100" cy="80" r="300" fill="url(#glowLeft)" class="pulse-glow-1" />
  <circle cx="700" cy="170" r="300" fill="url(#glowRight)" class="pulse-glow-2" />

  <!-- Floating Tech Grid -->
  <g class="grid-bg">
    <rect width="100%" height="300" fill="url(#techGrid)" y="-50" />
  </g>

  <!-- Border & Frames -->
  <rect width="798" height="248" x="1" y="1" fill="none" class="accent-border" />
  
  <!-- Sleek Gold Corners -->
  <path d="M 12 1 L 1 1 L 1 12" class="corner-decor" />
  <path d="M 788 1 L 799 1 L 799 12" class="corner-decor" />
  <path d="M 12 249 L 1 249 L 1 238" class="corner-decor" />
  <path d="M 788 249 L 799 249 L 799 238" class="corner-decor" />

  <!-- Centered Content -->
  <g transform="translate(400, 125)" text-anchor="middle">
    <!-- Subtitle (Role) -->
    <text y="-52" class="text-title">Artificial Intelligence Engineer</text>
    
    <!-- Code Accent Lines -->
    <text x="-210" y="10" class="text-code">[</text>
    <text x="210" y="10" class="text-code">]</text>

    <!-- Main Typography (Name) -->
    <text y="10" class="text-name" filter="url(#goldGlow)">SAKETH</text>
    
    <!-- Accent Line -->
    <rect x="-240" y="28" width="480" height="1.5" fill="url(#lineGrad)" />
    
    <!-- Domains tag -->
    <text y="52" class="text-code">MACHINE LEARNING • DEEP LEARNING • COMPUTER VISION • LLMs</text>
  </g>

  <!-- Bottom Left Console Status -->
  <g transform="translate(20, 230)">
    <circle cx="0" cy="-3" r="3" fill="#D4AF37" />
    <text x="10" y="1" font-family="'SFMono-Regular', Consolas, monospace" font-size="10" fill="#64748B">System: gsaketh2006.py --active</text>
  </g>
</svg>

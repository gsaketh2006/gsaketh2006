<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050814" />
      <stop offset="50%" stop-color="#0b1021" />
      <stop offset="100%" stop-color="#03050a" />
    </linearGradient>

    <!-- Text Gradient -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF" />
      <stop offset="50%" stop-color="#BC8CFF" />
      <stop offset="100%" stop-color="#FF7B72" />
    </linearGradient>

    <!-- Line Accent Gradient -->
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0" />
      <stop offset="15%" stop-color="#58A6FF" stop-opacity="1" />
      <stop offset="50%" stop-color="#BC8CFF" stop-opacity="1" />
      <stop offset="85%" stop-color="#FF7B72" stop-opacity="1" />
      <stop offset="100%" stop-color="#FF7B72" stop-opacity="0" />
    </linearGradient>

    <!-- Radial Glow Gradients -->
    <radialGradient id="glowLeft" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#1F6FEB" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#1F6FEB" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowRight" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#8E2DE2" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#8E2DE2" stop-opacity="0" />
    </radialGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#30363D" stroke-width="0.5" stroke-opacity="0.3" />
    </pattern>

    <!-- Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* CSS Animations */
    @keyframes pulseGlow {
      0% { opacity: 0.3; }
      50% { opacity: 0.6; }
      100% { opacity: 0.3; }
    }
    @keyframes moveGrid {
      0% { transform: translateY(0px); }
      100% { transform: translateY(40px); }
    }
    .glow-bg-1 {
      animation: pulseGlow 8s ease-in-out infinite;
    }
    .glow-bg-2 {
      animation: pulseGlow 12s ease-in-out infinite alternate;
    }
    .grid-bg {
      animation: moveGrid 20s linear infinite;
    }
    .text-title {
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 900;
      font-size: 56px;
      fill: url(#textGradient);
      letter-spacing: 8px;
    }
    .text-subtitle {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 500;
      font-size: 14px;
      fill: #8b949e;
      letter-spacing: 5px;
      text-transform: uppercase;
    }
    .text-tags {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 400;
      font-size: 11px;
      fill: #58a6ff;
      letter-spacing: 2px;
      opacity: 0.85;
    }
    .bracket {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 32px;
      fill: #30363D;
    }
    .status-dot {
      fill: #56D364;
      animation: pulseGlow 2s ease-in-out infinite;
    }
    .status-text {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      fill: #8b949e;
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGradient)" />

  <!-- Animated Ambient Glows -->
  <circle cx="150" cy="80" r="250" fill="url(#glowLeft)" class="glow-bg-1" />
  <circle cx="650" cy="170" r="250" fill="url(#glowRight)" class="glow-bg-2" />

  <!-- Grid Overlay (with animation) -->
  <g class="grid-bg">
    <rect width="100%" height="300" fill="url(#grid)" y="-40" />
  </g>

  <!-- Sleek Top/Bottom Borders -->
  <line x1="0" y1="0" x2="800" y2="0" stroke="#30363D" stroke-width="2" />
  <line x1="0" y1="250" x2="800" y2="250" stroke="#30363D" stroke-width="2" />

  <!-- Main Content Group (Centered visually) -->
  <g transform="translate(400, 125)" text-anchor="middle">
    <!-- Subtitle (Above Name) -->
    <text y="-50" class="text-subtitle">Artificial Intelligence Engineer</text>
    
    <!-- Code Brackets around name -->
    <text x="-160" y="8" class="bracket">&lt;</text>
    <text x="160" y="8" class="bracket">/&gt;</text>

    <!-- Main Name -->
    <text y="10" class="text-title" filter="url(#neonGlow)">SAKETH</text>
    
    <!-- Accent Line underneath -->
    <rect x="-250" y="25" width="500" height="2" fill="url(#lineGradient)" />
    
    <!-- Core Interest Tags -->
    <text y="48" class="text-tags">MACHINE LEARNING • DEEP LEARNING • COMPUTER VISION • GEN AI</text>
  </g>

  <!-- Status Bar at Bottom Right -->
  <g transform="translate(640, 225)">
    <circle cx="0" cy="-3" r="4" class="status-dot" />
    <text x="12" y="1" class="status-text">Learning LLMs &amp; RAG</text>
  </g>

  <!-- Status Bar at Bottom Left -->
  <g transform="translate(40, 225)">
    <text x="0" y="1" class="status-text" fill="#30363D">Console: gsaketh2006.py --active</text>
  </g>
</svg>

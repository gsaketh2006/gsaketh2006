<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020408" />
      <stop offset="50%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#04060b" />
    </linearGradient>

    <!-- Golden Yellow to Light Orange Gradient -->
    <linearGradient id="goldOrangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="50%" stop-color="#FFA726" />
      <stop offset="100%" stop-color="#FF6D00" />
    </linearGradient>

    <!-- Line Gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0" />
      <stop offset="20%" stop-color="#FFD700" stop-opacity="1" />
      <stop offset="50%" stop-color="#FFA726" stop-opacity="1" />
      <stop offset="80%" stop-color="#FF6D00" stop-opacity="1" />
      <stop offset="100%" stop-color="#FF6D00" stop-opacity="0" />
    </linearGradient>

    <!-- Subtle Warm Ambient Glows -->
    <radialGradient id="glowLeft" cx="15%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFA726" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#FFA726" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowRight" cx="85%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0" />
    </radialGradient>

    <!-- Sleek Tech Grid Pattern -->
    <pattern id="techGrid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1E293B" stroke-width="0.5" stroke-opacity="0.4" />
      <circle cx="0" cy="0" r="1" fill="#FFA726" fill-opacity="0.2" />
    </pattern>
  </defs>

  <style>
    @keyframes gridFloat {
      0% { transform: translateY(0px); }
      100% { transform: translateY(50px); }
    }
    .grid-bg { animation: gridFloat 25s linear infinite; }
    
    .text-name {
      font-family: 'Outfit', 'Inter', -apple-system, sans-serif;
      font-weight: 900;
      font-size: 58px;
      fill: url(#goldOrangeGrad);
      letter-spacing: 12px;
    }
    .text-title {
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 500;
      font-size: 13px;
      fill: #94A3B8;
      letter-spacing: 6px;
      text-transform: uppercase;
    }
    .text-code {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 11px;
      fill: #FFA726;
      letter-spacing: 2px;
      opacity: 0.85;
    }
    .accent-border {
      stroke: #334155;
      stroke-width: 1.5;
    }
    .corner-decor {
      fill: none;
      stroke: #FFD700;
      stroke-width: 1.5;
    }
  </style>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- Subtle Ambient Glows -->
  <circle cx="100" cy="80" r="300" fill="url(#glowLeft)" />
  <circle cx="700" cy="170" r="300" fill="url(#glowRight)" />

  <!-- Floating Tech Grid -->
  <g class="grid-bg">
    <rect width="100%" height="300" fill="url(#techGrid)" y="-50" />
  </g>

  <!-- Border & Frames -->
  <rect width="798" height="248" x="1" y="1" fill="none" class="accent-border" />
  
  <!-- Sleek Corners -->
  <path d="M 12 1 L 1 1 L 1 12" class="corner-decor" />
  <path d="M 788 1 L 799 1 L 799 12" class="corner-decor" />
  <path d="M 12 249 L 1 249 L 1 238" class="corner-decor" />
  <path d="M 788 249 L 799 249 L 799 238" class="corner-decor" />

  <!-- Centered Content -->
  <g transform="translate(400, 125)" text-anchor="middle">
    <!-- Subtitle (Role) -->
    <text y="-52" class="text-title">Artificial Intelligence Engineer</text>
    
    <!-- Code Accent Brackets -->
    <text x="-210" y="10" class="text-code">[</text>
    <text x="210" y="10" class="text-code">]</text>

    <!-- Main Typography (Name) -->
    <text y="10" class="text-name">SAKETH</text>
    
    <!-- Accent Line -->
    <rect x="-240" y="28" width="480" height="1.5" fill="url(#lineGrad)" />
    
    <!-- Domains tag -->
    <text y="52" class="text-code">MACHINE LEARNING • DEEP LEARNING • COMPUTER VISION • LLMs</text>
  </g>

  <!-- Bottom Left Console Status -->
  <g transform="translate(20, 230)">
    <circle cx="0" cy="-3" r="3" fill="#FFA726" />
    <text x="10" y="1" font-family="'SFMono-Regular', Consolas, monospace" font-size="10" fill="#64748B">System: gsaketh2006.py --active</text>
  </g>
</svg>

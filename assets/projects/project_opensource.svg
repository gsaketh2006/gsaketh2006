<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 140" width="100%" height="100%">
  <defs>
    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7b72" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#161b22" stop-opacity="0.2" />
    </linearGradient>
    
    <!-- Background Glow -->
    <radialGradient id="cardGlow" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#ff7b72" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ff7b72" stop-opacity="0" />
    </radialGradient>
  </defs>

  <style>
    .card-bg {
      fill: #0d1117;
      stroke: url(#borderGrad);
      stroke-width: 1.5;
      rx: 8px;
    }
    .glow-overlay {
      fill: url(#cardGlow);
      pointer-events: none;
      rx: 8px;
    }
    .title-text {
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 700;
      font-size: 15px;
      fill: #ff7b72;
    }
    .desc-text {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      font-size: 11.5px;
      fill: #8b949e;
      line-height: 16px;
    }
    .badge-bg {
      fill: #161b22;
      stroke: #30363d;
      stroke-width: 1;
      rx: 10px;
    }
    .badge-txt {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 9px;
      fill: #c9d1d9;
      font-weight: 600;
    }
    .icon-symbol {
      fill: #ff7b72;
    }
  </style>

  <!-- Background Base -->
  <rect class="card-bg" width="338" height="138" x="1" y="1" />
  <rect class="glow-overlay" width="338" height="138" x="1" y="1" />

  <!-- Project Icon (Git Branch Symbol) -->
  <g transform="translate(20, 20)">
    <path class="icon-symbol" d="M18.8 11.2c-.8-.8-2-.8-2.8 0l-3.4 3.4c-.4.4-.9.6-1.4.6h-1.7v-2.1c.9-.4 1.5-1.3 1.5-2.4 0-1.5-1.2-2.7-2.7-2.7S5.5 9.3 5.5 10.7c0 1.1.6 2 1.5 2.4v5.6c-.9.4-1.5 1.3-1.5 2.4 0 1.5 1.2 2.7 2.7 2.7s2.7-1.2 2.7-2.7c0-1.1-.6-2-1.5-2.4v-3.1h1.7c1 0 2-.4 2.8-1.2l3.4-3.4c.8-.8.8-2 0-2.8z" transform="scale(1.2) translate(1, -1)"/>
  </g>

  <!-- Project Title -->
  <text x="52" y="34" class="title-text">Open Source Contributions</text>

  <!-- Description -->
  <text x="20" y="62" class="desc-text">
    <tspan x="20" dy="0">Active contributions to modern libraries, fixing database</tspan>
    <tspan x="20" dy="16">drivers, improving web documentation, and releasing</tspan>
    <tspan x="20" dy="16">helpful automation tools and scripts to the community.</tspan>
  </text>

  <!-- Tech Stack Badges -->
  <!-- Badge 1: Git -->
  <rect x="20" y="108" width="48" height="18" class="badge-bg" />
  <text x="44" y="120" text-anchor="middle" class="badge-txt">Git</text>

  <!-- Badge 2: GitHub -->
  <rect x="74" y="108" width="58" height="18" class="badge-bg" />
  <text x="103" y="120" text-anchor="middle" class="badge-txt">GitHub</text>

  <!-- Badge 3: Linux -->
  <rect x="138" y="108" width="52" height="18" class="badge-bg" />
  <text x="164" y="120" text-anchor="middle" class="badge-txt">Linux</text>

  <!-- Badge 4: Markdown -->
  <rect x="196" y="108" width="68" height="18" class="badge-bg" />
  <text x="230" y="120" text-anchor="middle" class="badge-txt">Markdown</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 140" width="100%" height="100%">
  <defs>
    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dbab09" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#161b22" stop-opacity="0.2" />
    </linearGradient>
    
    <!-- Background Glow -->
    <radialGradient id="cardGlow" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#dbab09" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#dbab09" stop-opacity="0" />
    </radialGradient>
  </defs>

  <style>
    .card-bg {
      fill: #0d1117;
      stroke: url(#borderGrad);
      stroke-width: 1.5;
      rx: 8px;
    }
    .glow-overlay {
      fill: url(#cardGlow);
      pointer-events: none;
      rx: 8px;
    }
    .title-text {
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 700;
      font-size: 15px;
      fill: #dbab09;
    }
    .desc-text {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      font-size: 11.5px;
      fill: #8b949e;
      line-height: 16px;
    }
    .badge-bg {
      fill: #161b22;
      stroke: #30363d;
      stroke-width: 1;
      rx: 10px;
    }
    .badge-txt {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 9px;
      fill: #c9d1d9;
      font-weight: 600;
    }
    .icon-symbol {
      fill: #dbab09;
    }
  </style>

  <!-- Background Base -->
  <rect class="card-bg" width="338" height="138" x="1" y="1" />
  <rect class="glow-overlay" width="338" height="138" x="1" y="1" />

  <!-- Project Icon (Hostel/Building Symbol) -->
  <g transform="translate(20, 20)">
    <path class="icon-symbol" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" transform="scale(1.2)"/>
  </g>

  <!-- Project Title -->
  <text x="52" y="34" class="title-text">Hostel Management System</text>

  <!-- Description -->
  <text x="20" y="62" class="desc-text">
    <tspan x="20" dy="0">DBMS application tracking student room allocations, dining</tspan>
    <tspan x="20" dy="16">fees, and grievance workflows. Supports user authentication</tspan>
    <tspan x="20" dy="16">and interactive administrative control panels.</tspan>
  </text>

  <!-- Tech Stack Badges -->
  <!-- Badge 1: Java -->
  <rect x="20" y="108" width="48" height="18" class="badge-bg" />
  <text x="44" y="120" text-anchor="middle" class="badge-txt">Java</text>

  <!-- Badge 2: MySQL -->
  <rect x="74" y="108" width="54" height="18" class="badge-bg" />
  <text x="101" y="120" text-anchor="middle" class="badge-txt">MySQL</text>

  <!-- Badge 3: CSS -->
  <rect x="134" y="108" width="42" height="18" class="badge-bg" />
  <text x="155" y="120" text-anchor="middle" class="badge-txt">CSS</text>

  <!-- Badge 4: JDBC -->
  <rect x="182" y="108" width="48" height="18" class="badge-bg" />
  <text x="206" y="120" text-anchor="middle" class="badge-txt">JDBC</text>
</svg>

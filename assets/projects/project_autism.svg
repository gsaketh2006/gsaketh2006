<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 140" width="100%" height="100%">
  <defs>
    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#161b22" stop-opacity="0.2" />
    </linearGradient>
    
    <!-- Background Glow -->
    <radialGradient id="cardGlow" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0" />
    </radialGradient>
  </defs>

  <style>
    .card-bg {
      fill: #0d1117;
      stroke: url(#borderGrad);
      stroke-width: 1.5;
      rx: 8px;
    }
    .glow-overlay {
      fill: url(#cardGlow);
      pointer-events: none;
      rx: 8px;
    }
    .title-text {
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 700;
      font-size: 15px;
      fill: #58a6ff;
    }
    .desc-text {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      font-size: 11.5px;
      fill: #8b949e;
      line-height: 16px;
    }
    .badge-bg {
      fill: #161b22;
      stroke: #30363d;
      stroke-width: 1;
      rx: 10px;
    }
    .badge-txt {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 9px;
      fill: #c9d1d9;
      font-weight: 600;
    }
    .icon-symbol {
      fill: #58a6ff;
    }
  </style>

  <!-- Background Base -->
  <rect class="card-bg" width="338" height="138" x="1" y="1" />
  <rect class="glow-overlay" width="338" height="138" x="1" y="1" />

  <!-- Project Icon (Brain/ML Symbol) -->
  <g transform="translate(20, 20)">
    <path class="icon-symbol" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
  </g>

  <!-- Project Title -->
  <text x="52" y="34" class="title-text">Autism Prediction using ML</text>

  <!-- Description (Multi-line layout using tspans) -->
  <text x="20" y="62" class="desc-text">
    <tspan x="20" dy="0">Machine learning models engineered to predict ASD traits</tspan>
    <tspan x="20" dy="16">in toddlers. Features high sensitivity classifiers, data</tspan>
    <tspan x="20" dy="16">preprocessing pipelines, and metric optimizations.</tspan>
  </text>

  <!-- Tech Stack Badges -->
  <!-- Badge 1: Python -->
  <rect x="20" y="108" width="58" height="18" class="badge-bg" />
  <text x="49" y="120" text-anchor="middle" class="badge-txt">Python</text>

  <!-- Badge 2: Scikit-Learn -->
  <rect x="84" y="108" width="82" height="18" class="badge-bg" />
  <text x="125" y="120" text-anchor="middle" class="badge-txt">Scikit-Learn</text>

  <!-- Badge 3: Pandas -->
  <rect x="172" y="108" width="58" height="18" class="badge-bg" />
  <text x="201" y="120" text-anchor="middle" class="badge-txt">Pandas</text>

  <!-- Badge 4: Seaborn -->
  <rect x="236" y="108" width="62" height="18" class="badge-bg" />
  <text x="267" y="120" text-anchor="middle" class="badge-txt">Matplotlib</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 140" width="100%" height="100%">
  <defs>
    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bc8cff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#161b22" stop-opacity="0.2" />
    </linearGradient>
    
    <!-- Background Glow -->
    <radialGradient id="cardGlow" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#8a2deb" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#8a2deb" stop-opacity="0" />
    </radialGradient>
  </defs>

  <style>
    .card-bg {
      fill: #0d1117;
      stroke: url(#borderGrad);
      stroke-width: 1.5;
      rx: 8px;
    }
    .glow-overlay {
      fill: url(#cardGlow);
      pointer-events: none;
      rx: 8px;
    }
    .title-text {
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 700;
      font-size: 15px;
      fill: #bc8cff;
    }
    .desc-text {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      font-size: 11.5px;
      fill: #8b949e;
      line-height: 16px;
    }
    .badge-bg {
      fill: #161b22;
      stroke: #30363d;
      stroke-width: 1;
      rx: 10px;
    }
    .badge-txt {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 9px;
      fill: #c9d1d9;
      font-weight: 600;
    }
    .icon-symbol {
      fill: #bc8cff;
    }
  </style>

  <!-- Background Base -->
  <rect class="card-bg" width="338" height="138" x="1" y="1" />
  <rect class="glow-overlay" width="338" height="138" x="1" y="1" />

  <!-- Project Icon (Stack/Queue Flow Symbol) -->
  <g transform="translate(20, 20)">
    <path class="icon-symbol" d="M19 15v4H5v-4h14m1-2H4c-.55 0-1 .45-1 1v6c0 .55.45 1 1 1h16c.55 0 1-.45 1-1v-6c0-.55-.45-1-1-1zM7 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm12-9v4H5v-4h14m1-2H4c-.55 0-1 .45-1 1v6c0 .55.45 1 1 1h16c.55 0 1-.45 1-1V8.5c0-.55-.45-1-1-1zM7 12c-.83 0-1.5-.67-1.5-1.5S6.17 9 7 9s1.5.67 1.5 1.5S7.83 12 7 12zm12-9v4H5V3h14m1-2H4c-.55 0-1 .45-1 1v6c0 .55.45 1 1 1h16c.55 0 1-.45 1-1V2c0-.55-.45-1-1-1zM7 5.5C6.17 5.5 5.5 4.83 5.5 4S6.17 2.5 7 2.5 8.5 3.17 8.5 4 7.83 5.5 7 5.5z"/>
  </g>

  <!-- Project Title -->
  <text x="52" y="34" class="title-text">QFlow Queue Management</text>

  <!-- Description -->
  <text x="20" y="62" class="desc-text">
    <tspan x="20" dy="0">Intelligent real-time queue management system designed</tspan>
    <tspan x="20" dy="16">to optimize retail customer flows. Incorporates live state</tspan>
    <tspan x="20" dy="16">syncing, slot bookings, and queue length estimators.</tspan>
  </text>

  <!-- Tech Stack Badges -->
  <!-- Badge 1: React -->
  <rect x="20" y="108" width="54" height="18" class="badge-bg" />
  <text x="47" y="120" text-anchor="middle" class="badge-txt">React</text>

  <!-- Badge 2: Node.js -->
  <rect x="80" y="108" width="58" height="18" class="badge-bg" />
  <text x="109" y="120" text-anchor="middle" class="badge-txt">Node.js</text>

  <!-- Badge 3: Express -->
  <rect x="144" y="108" width="62" height="18" class="badge-bg" />
  <text x="175" y="120" text-anchor="middle" class="badge-txt">Express</text>

  <!-- Badge 4: Supabase -->
  <rect x="212" y="108" width="68" height="18" class="badge-bg" />
  <text x="246" y="120" text-anchor="middle" class="badge-txt">Supabase</text>
</svg>

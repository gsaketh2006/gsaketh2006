<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 140" width="100%" height="100%">
  <defs>
    <!-- Border Gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#56d364" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#161b22" stop-opacity="0.2" />
    </linearGradient>
    
    <!-- Background Glow -->
    <radialGradient id="cardGlow" cx="0%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#2ea44f" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#2ea44f" stop-opacity="0" />
    </radialGradient>
  </defs>

  <style>
    .card-bg {
      fill: #0d1117;
      stroke: url(#borderGrad);
      stroke-width: 1.5;
      rx: 8px;
    }
    .glow-overlay {
      fill: url(#cardGlow);
      pointer-events: none;
      rx: 8px;
    }
    .title-text {
      font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 700;
      font-size: 15px;
      fill: #56d364;
    }
    .desc-text {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      font-size: 11.5px;
      fill: #8b949e;
      line-height: 16px;
    }
    .badge-bg {
      fill: #161b22;
      stroke: #30363d;
      stroke-width: 1;
      rx: 10px;
    }
    .badge-txt {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 9px;
      fill: #c9d1d9;
      font-weight: 600;
    }
    .icon-symbol {
      fill: #56d364;
    }
  </style>

  <!-- Background Base -->
  <rect class="card-bg" width="338" height="138" x="1" y="1" />
  <rect class="glow-overlay" width="338" height="138" x="1" y="1" />

  <!-- Project Icon (Monitor/Laptop Symbol) -->
  <g transform="translate(20, 20)">
    <path class="icon-symbol" d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-5 14H9v-2h6v2zm5-4H4V6h16v8z"/>
  </g>

  <!-- Project Title -->
  <text x="52" y="34" class="title-text">Portfolio Website</text>

  <!-- Description -->
  <text x="20" y="62" class="desc-text">
    <tspan x="20" dy="0">Premium personal website highlighting development skills,</tspan>
    <tspan x="20" dy="16">AI projects, and open-source contributions. Features</tspan>
    <tspan x="20" dy="16">smooth animations and elegant responsive layouts.</tspan>
  </text>

  <!-- Tech Stack Badges -->
  <!-- Badge 1: React -->
  <rect x="20" y="108" width="54" height="18" class="badge-bg" />
  <text x="47" y="120" text-anchor="middle" class="badge-txt">React</text>

  <!-- Badge 2: HTML5 -->
  <rect x="80" y="108" width="54" height="18" class="badge-bg" />
  <text x="107" y="120" text-anchor="middle" class="badge-txt">HTML5</text>

  <!-- Badge 3: CSS3 -->
  <rect x="140" y="108" width="48" height="18" class="badge-bg" />
  <text x="164" y="120" text-anchor="middle" class="badge-txt">CSS3</text>

  <!-- Badge 4: Vercel -->
  <rect x="194" y="108" width="54" height="18" class="badge-bg" />
  <text x="221" y="120" text-anchor="middle" class="badge-txt">Vercel</text>
</svg>

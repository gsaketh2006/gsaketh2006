<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 60" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#03050a" />
      <stop offset="100%" stop-color="#05070c" />
    </linearGradient>

    <!-- Glowing Line Gradient -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0" />
      <stop offset="20%" stop-color="#D4AF37" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#F3E5AB" stop-opacity="0.8" />
      <stop offset="80%" stop-color="#9A7B3C" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#9A7B3C" stop-opacity="0" />
    </linearGradient>
  </defs>

  <style>
    .text-footer {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 10px;
      fill: #64748B;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .accent-border {
      stroke: #1E293B;
      stroke-width: 1;
    }
  </style>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />
  <rect width="798" height="58" x="1" y="1" fill="none" class="accent-border" />

  <!-- Accent Top Line -->
  <rect x="150" y="0" width="500" height="1.5" fill="url(#lineGrad)" />

  <!-- Footer Text -->
  <text x="400" y="35" text-anchor="middle" class="text-footer">Designed with 💻 and 🧠 by Saketh © 2026. All rights reserved.</text>
</svg>
